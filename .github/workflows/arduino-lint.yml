name: Arduino Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Arduino Lint
        uses: arduino/arduino-lint-action@v3
        with:
          project-type: sketch
          compliance: specification
          recursive: true
